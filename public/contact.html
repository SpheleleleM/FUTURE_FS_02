<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }

    .card h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 14px;
      color: #888;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .required { color: #e53e3e; }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 1.1rem;
      outline: none;
      font-family: inherit;
      transition: border 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4f46e5;
    }

    textarea { height: 100px; resize: vertical; }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }
    button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .success {
      display: none;
      text-align: center;
      padding: 2rem;
    }

    .success .checkmark {
      font-size: 48px;
      margin-bottom: 1rem;
    }

    .success h2 {
      font-size: 20px;
      color: #16a34a;
      margin-bottom: 8px;
    }

    .success p {
      font-size: 14px;
      color: #888;
      margin-bottom: 0;
    }

    .error-msg {
      font-size: 13px;
      color: #e53e3e;
      margin-top: -8px;
      margin-bottom: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="card">

    <div id="form-section">
      <h1>Get In Touch</h1>
      <p>Fill out the form below and we'll get back to you as soon as possible.</p>

      <label>Full Name <span class="required">*</span></label>
      <input type="text" id="name" placeholder="John Doe" />

      <label>Email Address <span class="required">*</span></label>
      <input type="email" id="email" placeholder="john@example.com" />

      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="555-0000" />

      <label>How did you hear about us?</label>
      <select id="source">
        <option value="website">Found you on the website</option>
        <option value="referral">Referred by someone</option>
        <option value="social media">Social media</option>
        <option value="other">Other</option>
      </select>

      <label>Message</label>
      <textarea id="notes" placeholder="Tell us what you need help with..."></textarea>

      <p class="error-msg" id="error-msg">Please fill in your name and email.</p>

      <button id="submit-btn" onclick="submitForm()">Send Message</button>
    </div>

    <div class="success" id="success-section">
      <div class="checkmark">✅</div>
      <h2>Message Sent!</h2>
      <p>Thank you for reaching out. We'll be in touch with you shortly.</p>
    </div>

  </div>

  <script>
    async function submitForm() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const source = document.getElementById('source').value;
      const notes = document.getElementById('notes').value.trim();

      if (!name || !email) {
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      document.getElementById('error-msg').style.display = 'none';

      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Sending...';

      const res = await fetch('/api/leads/public', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, phone, source, notes })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = 'Send Message';
        alert('Something went wrong. Please try again.');
      }
    }
  </script>

</body>
</html>
